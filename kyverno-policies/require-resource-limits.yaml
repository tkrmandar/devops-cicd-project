apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/description: >
      All containers must define CPU and memory limits
      to prevent resource exhaustion in the cluster.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: require-limits
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - dev
          - prod
    validate:
      message: >
        ❌ Resource limits are required!
        All containers must define:
        resources.limits.memory and resources.limits.cpu
      pattern:
        spec:
          containers:
          - resources:
              limits:
                memory: "?*"    # must exist and be non-empty
                cpu: "?*"
