name: CD - Switch Traffic to GREEN (Go Live)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type CONFIRM to proceed with traffic switch'
        required: true
        type: string

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/task-manager-api

jobs:

# ============================================================
# JOB 1 - APPROVAL GATE 2: Switch Traffic
# ============================================================
  approval-gate-2:
    name: ⏸️ Waiting for Release Manager Approval
    runs-on: ubuntu-latest
    environment: prod-live        # ← second approval gate!
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "CONFIRM" ]; then
            echo "❌ You must type CONFIRM to proceed"
            exit 1
          fi
          echo "✅ Release Manager approved traffic switch!"
          echo "👤 Approved by: ${{ github.actor }}"
          echo "🕐 Time       : $(date)"

# ============================================================
# JOB 2 - SWITCH TRAFFIC BLUE → GREEN
# ============================================================
  switch-traffic:
    name: 🔄 Switch Traffic BLUE → GREEN
    runs-on: ubuntu-latest
    needs: approval-gate-2
    steps:
      - name: Checkout K8s manifests repo
        uses: actions/checkout@v4
        with:
          repository: tkrmandar/devops-k8s-manifests
          token: ${{ secrets.K8S_REPO_TOKEN }}
          path: k8s-manifests

      - name: Switch ingress to GREEN
        run: |
          cd k8s-manifests
          echo "Current ingress:"
          grep "name: task-manager" prod/ingress.yaml

          # Switch to green
          sed -i "s|name: task-manager-api-blue-svc|name: task-manager-api-green-svc|g" prod/ingress.yaml

          echo "Updated ingress:"
          grep "name: task-manager" prod/ingress.yaml

      - name: Commit and push
        run: |
          cd k8s-manifests
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git diff --exit-code prod/ingress.yaml || {
            git add prod/ingress.yaml
            git commit -m "cd: switch prod traffic from blue to green

            Approved by: ${{ github.actor }}
            Time: $(date)"
            git push
            echo "✅ Ingress updated — ArgoCD will sync"
          }

# ============================================================
# JOB 3 - POST DEPLOY MONITORING (5 mins auto rollback)
# ============================================================
  monitor-and-rollback:
    name: 📊 Monitor GREEN — Auto Rollback if Unhealthy
    runs-on: ubuntu-latest
    needs: switch-traffic
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Monitor GREEN for 5 minutes
        run: |
          echo "📊 Monitoring GREEN for 5 minutes..."
          echo "Will auto rollback if health checks fail"

          CHECKS=0
          FAILURES=0
          MAX_CHECKS=10        # check every 30 sec for 5 mins
          MAX_FAILURES=3       # rollback after 3 consecutive failures

          while [ $CHECKS -lt $MAX_CHECKS ]; do
            CHECKS=$((CHECKS + 1))
            echo ""
            echo "🔍 Health check $CHECKS/$MAX_CHECKS..."

            GREEN_POD=$(kubectl get pods -n prod \
              -l app=task-manager-api,slot=green \
              --field-selector=status.phase=Running \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")

            if [ -z "$GREEN_POD" ]; then
              echo "❌ No running GREEN pods found!"
              FAILURES=$((FAILURES + 1))
            else
              kubectl port-forward pod/$GREEN_POD 3002:3000 -n prod &
              PF_PID=$!
              sleep 3

              HEALTH=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time 5 http://localhost:3002/health 2>/dev/null || echo "000")

              kill $PF_PID 2>/dev/null

              if [ "$HEALTH" == "200" ]; then
                echo "✅ GREEN healthy (HTTP $HEALTH)"
                FAILURES=0      # reset failure count on success
              else
                echo "❌ GREEN unhealthy (HTTP $HEALTH)"
                FAILURES=$((FAILURES + 1))
              fi
            fi

            # Auto rollback if too many failures
            if [ $FAILURES -ge $MAX_FAILURES ]; then
              echo ""
              echo "🚨 $MAX_FAILURES consecutive failures detected!"
              echo "🔄 Initiating AUTO ROLLBACK to BLUE..."
              exit 2    # special exit code for rollback
            fi

            sleep 30
          done

          echo ""
          echo "✅ GREEN stable for 5 minutes!"
          echo "🎉 Deployment successful!"

      - name: Checkout for rollback if needed
        if: failure()
        uses: actions/checkout@v4
        with:
          repository: tkrmandar/devops-k8s-manifests
          token: ${{ secrets.K8S_REPO_TOKEN }}
          path: k8s-manifests

      - name: AUTO ROLLBACK to BLUE
        if: failure()
        run: |
          cd k8s-manifests
          echo "🚨 AUTO ROLLBACK TRIGGERED!"

          # Switch back to blue
          sed -i "s|name: task-manager-api-green-svc|name: task-manager-api-blue-svc|g" prod/ingress.yaml

          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add prod/ingress.yaml
          git commit -m "ROLLBACK: auto rollback to blue due to health check failures

          Rollback time: $(date)
          Triggered by: monitoring job"
          git push

          echo "✅ AUTO ROLLBACK COMPLETE — Traffic back on BLUE!"
          echo "🔍 Please investigate GREEN deployment issues"
